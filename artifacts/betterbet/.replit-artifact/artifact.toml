kind = "web"
previewPath = "/"
title = "BetterBet"
version = "1.0.0"
id = "artifacts/betterbet"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23233

[services.development]
run = "pnpm --filter @workspace/betterbet run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/betterbet", "run", "build" ]
publicDir = "artifacts/betterbet/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23233"
BASE_PATH = "/"
